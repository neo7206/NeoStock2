account:
  initial_capital: 1000000
  available_cash: 1000000
trading_costs:
  stock_fee_rate: 0.001425
  stock_fee_discount: 0.6
  stock_tax_rate: 0.003
  min_fee: 20
risk_management:
  max_single_position_pct: 0.50
  max_daily_loss: 10000
  default_stop_loss_pct: 0.05
  default_take_profit_pct: 0.1
  max_total_positions: 10
  max_single_amount: 2500000  # 單筆最大金額（0=不限制）
  daily_loss_halt: true       # 每日虧損達限額自動停機
strategy:
  monitor_interval: 5
  default_order_type: LMT
  default_order_lot: Common
trading:
  batch_size: 5         # 拆單：每批最多張數
  auto_price: false     # 是否自動從五檔取價
  sim_trade_end: "13:25" # 試撮結束時間（之後市價自動改限價）
database:
  path: data/neostock2.db
dashboard:
  host: 127.0.0.1
  port: 8080
notifications:
  platform: telegram
  telegram_token: ""
  telegram_chat_id: ""
logging:
  level: INFO
  file: data/logs/neostock2.log
auto_guardian:
  enabled: true
  check_interval: 30         # 掃描間隔（秒）
  trailing_stop_enabled: true
  trailing_stop_pct: 0.03    # 移動停利回撤 3%
position_sizer:
  method: fixed_pct           # fixed_pct / kelly
  risk_per_trade_pct: 0.02    # 每筆風險佔帳戶 2%
  max_position_pct: 0.25      # 單檔最多 25% 帳戶淨值
  min_lots: 1
